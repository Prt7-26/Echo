<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="PingFang SC, Microsoft YaHei, Segoe UI, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0c6e6a"/>
    </marker>
    <marker id="loop" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e8a13a"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#f6f8f7"/>

  <!-- tagline -->
  <text x="640" y="92" text-anchor="middle" font-size="30" font-weight="800" fill="#16302e">
    把「技能好不好」的判断权,交给用户的真实反应
  </text>
  <text x="640" y="132" text-anchor="middle" font-size="17" fill="#5a6663">
    不是让 agent 自己给自己打分,而是从你的行为里学习 —— 持续自我进化
  </text>

  <!-- ===== four nodes ===== -->
  <!-- N1: User & Agent -->
  <rect x="70" y="250" width="250" height="170" rx="18" fill="#ffffff" stroke="#cfdedb" stroke-width="1.5"/>
  <text x="195" y="322" text-anchor="middle" font-size="27" font-weight="800" fill="#16302e">你 ⇄ Agent</text>
  <text x="195" y="360" text-anchor="middle" font-size="17" fill="#5a6663">日常对话</text>

  <!-- N2: Echo listens (hero) -->
  <rect x="390" y="250" width="250" height="170" rx="18" fill="#0fb5ae"/>
  <text x="515" y="312" text-anchor="middle" font-size="27" font-weight="800" fill="#ffffff">Echo 倾听信号</text>
  <text x="515" y="352" text-anchor="middle" font-size="17" fill="#eafaf8">行为 · 语言 · 点赞点踩</text>
  <text x="515" y="380" text-anchor="middle" font-size="15" fill="#cdeeeb">(你不用刻意配置)</text>

  <!-- N3: manage skills -->
  <rect x="710" y="250" width="250" height="170" rx="18" fill="#ffffff" stroke="#cfdedb" stroke-width="1.5"/>
  <text x="835" y="305" text-anchor="middle" font-size="26" font-weight="800" fill="#16302e">管理技能</text>
  <text x="835" y="345" text-anchor="middle" font-size="16" fill="#5a6663">好的留下 · 差的退役</text>
  <text x="835" y="372" text-anchor="middle" font-size="16" fill="#5a6663">并记住你的偏好</text>

  <!-- N4: better agent -->
  <rect x="1030" y="250" width="180" height="170" rx="18" fill="#16302e"/>
  <text x="1120" y="312" text-anchor="middle" font-size="24" font-weight="800" fill="#ffffff">更懂你的</text>
  <text x="1120" y="348" text-anchor="middle" font-size="24" font-weight="800" fill="#0fb5ae">Agent</text>
  <text x="1120" y="382" text-anchor="middle" font-size="15" fill="#b9c6c4">主动满足你</text>

  <!-- forward arrows -->
  <path d="M320,335 L386,335" stroke="#0c6e6a" stroke-width="3" marker-end="url(#a)"/>
  <path d="M640,335 L706,335" stroke="#0c6e6a" stroke-width="3" marker-end="url(#a)"/>
  <path d="M960,335 L1026,335" stroke="#0c6e6a" stroke-width="3" marker-end="url(#a)"/>

  <!-- feedback loop arc: N4 -> N1 -->
  <path d="M1120,420 C1120,575 1120,600 640,600 C260,600 195,575 195,424"
        fill="none" stroke="#e8a13a" stroke-width="3.2" marker-end="url(#loop)"/>
  <rect x="556" y="578" width="168" height="44" rx="22" fill="#fbf2e0" stroke="#e8cf9a" stroke-width="1.4"/>
  <text x="640" y="606" text-anchor="middle" font-size="18" font-weight="700" fill="#b9760f">持续自我进化</text>
</svg>
