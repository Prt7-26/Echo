<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" font-family="Helvetica Neue, Arial, PingFang SC, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a5654"/></marker>
    <marker id="g" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0fb5ae"/></marker>
    <marker id="gs" viewBox="0 0 10 10" refX="2" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M10,0 L0,5 L10,10 z" fill="#7c5cc4"/></marker>
    <marker id="p" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c5cc4"/></marker>
    <style>
      .ti  { font-size:31px; font-weight:800; fill:#16302e; }
      .sub { font-size:14px; fill:#5a6663; }
      .h   { font-size:16px; font-weight:700; fill:#16302e; }
      .d   { font-size:12px; fill:#5a6663; }
      .tag { font-size:13px; font-weight:800; }
      .grp { font-size:15px; font-weight:800; }
      .leg { font-size:13px; fill:#3c4644; }
    </style>
  </defs>
  <rect width="1100" height="900" fill="#f6f8f7"/>

  <!-- title -->
  <text x="550" y="54" text-anchor="middle" class="ti">Echo Architecture</text>
  <text x="550" y="78" text-anchor="middle" class="sub">user-signal-driven skill lifecycle</text>

  <!-- ===== entry surfaces ===== -->
  <g font-size="14" font-weight="600" fill="#3c4644" text-anchor="middle">
    <rect x="95"  y="100" width="168" height="44" rx="10" fill="#fff" stroke="#d9cdb8"/><text x="179" y="127">CLI</text>
    <rect x="281" y="100" width="168" height="44" rx="10" fill="#fff" stroke="#d9cdb8"/><text x="365" y="127">TUI</text>
    <rect x="467" y="100" width="168" height="44" rx="10" fill="#fff" stroke="#d9cdb8"/><text x="551" y="127">Desktop UI</text>
    <rect x="653" y="100" width="168" height="44" rx="10" fill="#fff" stroke="#d9cdb8"/><text x="737" y="127">Telegram</text>
    <rect x="839" y="100" width="168" height="44" rx="10" fill="#fff" stroke="#d9cdb8"/><text x="923" y="127">…</text>
  </g>

  <!-- ===== gateway ===== -->
  <rect x="350" y="166" width="400" height="62" rx="12" fill="#f3ede3" stroke="#d9cdb8" stroke-width="1.4"/>
  <text x="550" y="194" text-anchor="middle" class="h">Gateway</text>
  <text x="550" y="216" text-anchor="middle" class="d">session routing · message dispatch</text>

  <!-- ===== agent execution loop (hosts M1/M2) ===== -->
  <rect x="70" y="262" width="700" height="214" rx="16" fill="#f3ede3" stroke="#d9cdb8" stroke-width="1.4"/>
  <text x="92" y="292" class="h">↻ Agent execution loop</text>
  <text x="300" y="292" class="d">reason · call tools · generate output</text>
  <rect x="96" y="328" width="320" height="116" rx="12" fill="#fdecea" stroke="#e0556e" stroke-width="1.4"/>
  <text x="116" y="362" class="tag" fill="#c43c54">M1 · Adaptive trigger</text>
  <text x="116" y="389" class="d">save-intent / complexity / edits / recurrence</text>
  <text x="116" y="411" class="d">finds skill-creation blind spots</text>
  <rect x="428" y="328" width="318" height="116" rx="12" fill="#fdecea" stroke="#e0556e" stroke-width="1.4"/>
  <text x="448" y="362" class="tag" fill="#c43c54">M2 · Scope confirmation</text>
  <text x="448" y="389" class="d">asks in-chat via clarify</text>
  <text x="448" y="411" class="d">2–4 concrete applicability options</text>

  <!-- ===== USER SIGNAL group (wraps Layer A/B/C) ===== -->
  <rect x="800" y="256" width="242" height="320" rx="16" fill="#eefaf8" stroke="#0fb5ae" stroke-width="2"/>
  <text x="921" y="284" text-anchor="middle" class="grp" fill="#0c6e6a">User Signal</text>
  <rect x="816" y="298" width="210" height="80" rx="10" fill="#fff" stroke="#0fb5ae" stroke-width="1.3"/>
  <text x="836" y="324" class="tag" fill="#0c6e6a">Layer A · Behavioral</text>
  <text x="836" y="346" class="d">zero-LLM · drift detection</text>
  <text x="836" y="365" class="d">edits · tool calls · errors</text>
  <rect x="816" y="386" width="210" height="80" rx="10" fill="#fff" stroke="#0fb5ae" stroke-width="1.3"/>
  <text x="836" y="412" class="tag" fill="#0c6e6a">Layer B · Language</text>
  <text x="836" y="434" class="d">NL sentiment, every turn</text>
  <text x="836" y="453" class="d">positive / negative / neutral</text>
  <rect x="816" y="474" width="210" height="80" rx="10" fill="#fff" stroke="#0fb5ae" stroke-width="1.3"/>
  <text x="836" y="500" class="tag" fill="#0c6e6a">Layer C · Judge</text>
  <text x="836" y="522" class="d">independent LLM, on-demand</text>
  <text x="836" y="541" class="d">rare · multi-vote audit</text>

  <!-- ===== Hermes runtime row ===== -->
  <rect x="70" y="508" width="214" height="92" rx="12" fill="#f3ede3" stroke="#d9cdb8" stroke-width="1.4"/>
  <text x="177" y="560" text-anchor="middle" class="h" font-size="15">Tooling runtime</text>
  <rect x="300" y="508" width="300" height="92" rx="12" fill="#f3ede3" stroke="#d9cdb8" stroke-width="1.4"/>
  <text x="450" y="560" text-anchor="middle" class="h" font-size="15">Skill library</text>
  <rect x="616" y="508" width="154" height="92" rx="12" fill="#f3ede3" stroke="#d9cdb8" stroke-width="1.4"/>
  <text x="693" y="560" text-anchor="middle" class="h" font-size="15">Memory</text>

  <!-- ===== management group (wraps M3/M4/M5) ===== -->
  <rect x="60" y="630" width="850" height="150" rx="16" fill="#f6f2fc" stroke="#7c5cc4" stroke-width="2"/>
  <text x="80" y="657" class="grp" fill="#5e42a6">Skill Management Library</text>
  <rect x="76"  y="668" width="250" height="98" rx="11" fill="#fff" stroke="#7c5cc4" stroke-width="1.3"/>
  <text x="96"  y="703" class="tag" fill="#5e42a6">M3 · Judge &amp; exclusion</text>
  <text x="96"  y="729" class="d">runs Layer C audit</text>
  <rect x="342" y="668" width="260" height="98" rx="11" fill="#fff" stroke="#7c5cc4" stroke-width="1.3"/>
  <text x="362" y="700" class="tag" fill="#5e42a6">M4 · Confidence engine</text>
  <text x="362" y="724" class="d">user-signal driven decay</text>
  <text x="362" y="744" class="d">active → pending_review → retired</text>
  <rect x="618" y="668" width="276" height="98" rx="11" fill="#fff" stroke="#7c5cc4" stroke-width="1.3"/>
  <text x="638" y="700" class="tag" fill="#5e42a6">M5 · Preference lib</text>
  <text x="638" y="724" class="d">consolidated profile + retrieval</text>
  <text x="638" y="744" class="d">confidence-weighted</text>

  <!-- ===== connectors ===== -->
  <path d="M550,146 L550,164" stroke="#4a5654" stroke-width="2" marker-end="url(#a)"/>
  <path d="M550,228 L550,260" stroke="#4a5654" stroke-width="2" marker-end="url(#a)"/>
  <path d="M300,476 L388,506" stroke="#4a5654" stroke-width="2" marker-end="url(#a)"/>
  <!-- agent loop -> User Signal -->
  <path d="M770,360 L797,360" stroke="#0fb5ae" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#g)"/>
  <!-- User Signal -> Confidence engine (M4): down the right, across the gap, into M4 -->
  <path d="M920,576 L920,610 L500,610 L500,664" stroke="#0fb5ae" stroke-width="2.6" fill="none" marker-end="url(#g)"/>
  <rect x="560" y="592" width="180" height="20" rx="5" fill="#f6f8f7"/>
  <text x="650" y="607" text-anchor="middle" class="d" fill="#0c6e6a" font-weight="700">signals → confidence</text>
  <!-- Skill library <-> Skill Management Library (bidirectional) -->
  <path d="M450,600 L450,628" stroke="#7c5cc4" stroke-width="2.4" fill="none" marker-end="url(#p)" marker-start="url(#gs)"/>
  <!-- M5 -> Agent loop (inject as few-shot): bows right to clear Memory, up into the loop -->
  <path d="M776,666 C792,580 790,520 762,482" stroke="#7c5cc4" stroke-width="2.4" stroke-dasharray="6 4" fill="none" marker-end="url(#p)"/>
  <rect x="618" y="488" width="150" height="20" rx="5" fill="#f6f8f7"/>
  <text x="693" y="503" text-anchor="middle" class="d" fill="#5e42a6" font-weight="700" font-style="italic">inject as few-shot</text>

  <!-- ===== legend ===== -->
  <line x1="70" y1="800" x2="1030" y2="800" stroke="#dfe6e4" stroke-width="1.2"/>
  <g font-size="13">
    <rect x="70"  y="816" width="16" height="16" rx="4" fill="#f3ede3" stroke="#d9cdb8"/><text x="94"  y="829" class="leg">Existing (Hermes, no change)</text>
    <rect x="320" y="816" width="16" height="16" rx="4" fill="#eefaf8" stroke="#0fb5ae"/><text x="344" y="829" class="leg">Echo · User Signal (Layer A/B/C)</text>
    <rect x="610" y="816" width="16" height="16" rx="4" fill="#fdecea" stroke="#e0556e"/><text x="634" y="829" class="leg">Echo · creation (M1, M2)</text>
    <rect x="830" y="816" width="16" height="16" rx="4" fill="#f6f2fc" stroke="#7c5cc4"/><text x="854" y="829" class="leg">Echo · management (M3–M5)</text>
  </g>
</svg>
